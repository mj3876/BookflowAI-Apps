# RDS password + JWT signing key from AWS Secrets Manager via ESO.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: dashboard-svc-secret
  namespace: bookflow
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bookflow-aws-secrets
    kind: ClusterSecretStore
  target:
    name: dashboard-svc-secret
    creationPolicy: Owner
  data:
    - secretKey: DASHBOARD_RDS_PASSWORD
      remoteRef:
        key: bookflow/rds/master-password
        property: password
    - secretKey: AUTH_JWT_SIGNING_KEY
      remoteRef:
        key: bookflow/auth/jwt-signing-key
