apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-svc-env
  namespace: bookflow
data:
  DASHBOARD_INVENTORY_SVC_URL:    "http://inventory-svc.bookflow.svc.cluster.local"
  DASHBOARD_FORECAST_SVC_URL:     "http://forecast-svc.bookflow.svc.cluster.local"
  DASHBOARD_DECISION_SVC_URL:     "http://decision-svc.bookflow.svc.cluster.local"
  DASHBOARD_NOTIFICATION_SVC_URL: "http://notification-svc.bookflow.svc.cluster.local"
  DASHBOARD_INTERVENTION_SVC_URL: "http://intervention-svc.bookflow.svc.cluster.local"
  DASHBOARD_REDIS_HOST: "bookflow-redis.xxpw8f.0001.apne1.cache.amazonaws.com"
  DASHBOARD_REDIS_PORT: "6379"
  DASHBOARD_RDS_HOST: "bookflow-postgres.c5hcctg31h30.ap-northeast-1.rds.amazonaws.com"
  DASHBOARD_RDS_PORT: "5432"
  DASHBOARD_RDS_DB: "bookflow"
  DASHBOARD_RDS_USER: "dashboard_svc"
  DASHBOARD_AUTH_MODE: "mock"
  DASHBOARD_LOG_LEVEL: "INFO"
  # auth.py reads AUTH_* (not DASHBOARD_AUTH_*) — dual-mode JWT verify
  AUTH_MODE: "jwt"
  AUTH_JWT_ISSUER: "bookflow-auth-pod"
  AUTH_JWT_AUDIENCE: "bookflow-services"
  DASHBOARD_FAN_IN_TIMEOUT_SECONDS: "3.0"
