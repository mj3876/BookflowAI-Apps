apiVersion: v1
kind: Service
metadata:
  name: dashboard-svc
  namespace: bookflow
  annotations:
    # NLB - 외부 노출 (dev). Phase 4 에서 ALB Ingress + ACM HTTPS 로 교체.
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
spec:
  type: LoadBalancer
  selector:
    app: dashboard-svc
  ports:
    - name: http
      port: 80
      targetPort: http
