# RDS password + JWT signing key + Azure Logic Apps SAS URL 4종 from AWS Secrets Manager via ESO.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: notification-svc-secret
  namespace: bookflow
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bookflow-aws-secrets
    kind: ClusterSecretStore
  target:
    name: notification-svc-secret
    creationPolicy: Owner
  data:
    - secretKey: NOTIFICATION_RDS_PASSWORD
      remoteRef:
        key: bookflow/rds/master-password
        property: password
    - secretKey: AUTH_JWT_SIGNING_KEY
      remoteRef:
        key: bookflow/auth/jwt-signing-key
    # Azure Logic Apps SAS callback URL (워크플로 별 분리 · bookflow/azure/logic-apps-urls JSON)
    - secretKey: NOTIFICATION_LOGIC_APPS_URL
      remoteRef:
        key: bookflow/azure/logic-apps-urls
        property: notification
    - secretKey: NOTIFICATION_LOGIC_APPS_APPROVAL_REQUEST_URL
      remoteRef:
        key: bookflow/azure/logic-apps-urls
        property: approval_request
    - secretKey: NOTIFICATION_LOGIC_APPS_STOCK_DEPART_URL
      remoteRef:
        key: bookflow/azure/logic-apps-urls
        property: stock_depart
    - secretKey: NOTIFICATION_LOGIC_APPS_STOCK_ARRIVAL_URL
      remoteRef:
        key: bookflow/azure/logic-apps-urls
        property: stock_arrival
