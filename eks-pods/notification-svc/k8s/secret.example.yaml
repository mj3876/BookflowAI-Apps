# Placeholder Secret — 실제 운영은 externalsecret.yaml (ESO + AWS Secrets Manager) 가 대체.
# RDS password: bookflow/rds/master-password · JWT: bookflow/auth/jwt-signing-key
# Logic Apps SAS URL 4종: bookflow/azure/logic-apps-urls (JSON · notification/approval_request/stock_depart/stock_arrival)
# 이 파일은 ESO 미설치 환경의 로컬 테스트용 placeholder 이며 cicd 가 apply 하지 않는다 (*.example.yaml).
apiVersion: v1
kind: Secret
metadata:
  name: notification-svc-secret
  namespace: bookflow
type: Opaque
stringData:
  NOTIFICATION_RDS_PASSWORD: CHANGE_ME_NOTIFICATION
  AUTH_JWT_SIGNING_KEY: REPLACE_ME_JWT
  # Azure Logic Apps SAS URL (HTTP trigger 인증키) — 실제 값은 ESO 가 주입
  NOTIFICATION_LOGIC_APPS_URL: "REPLACE_ME_LOGIC_APPS_NOTIFICATION_URL"
  NOTIFICATION_LOGIC_APPS_APPROVAL_REQUEST_URL: "REPLACE_ME_LOGIC_APPS_APPROVAL_REQUEST_URL"
  NOTIFICATION_LOGIC_APPS_STOCK_DEPART_URL: "REPLACE_ME_LOGIC_APPS_STOCK_DEPART_URL"
  NOTIFICATION_LOGIC_APPS_STOCK_ARRIVAL_URL: "REPLACE_ME_LOGIC_APPS_STOCK_ARRIVAL_URL"
