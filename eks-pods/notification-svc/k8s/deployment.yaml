apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-svc
  namespace: bookflow
  labels:
    app: notification-svc
    component: msa-pod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-svc
  template:
    metadata:
      labels:
        app: notification-svc
        component: msa-pod
    spec:
      serviceAccountName: notification-svc
      containers:
        - name: app
          image: ${ECR_REGISTRY}/bookflow/notification-svc:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          envFrom:
            - configMapRef:
                name: notification-svc-env
            - secretRef:
                name: notification-svc-secret
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            periodSeconds: 15
