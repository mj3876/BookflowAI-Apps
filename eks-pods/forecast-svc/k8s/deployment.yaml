apiVersion: apps/v1
kind: Deployment
metadata:
  name: forecast-svc
  namespace: bookflow
  labels:
    app: forecast-svc
    component: msa-pod
spec:
  replicas: 1  # dev cluster (t3.medium 17-pod limit). Phase 4: 2+ replicas with bigger nodegroup
  selector:
    matchLabels:
      app: forecast-svc
  template:
    metadata:
      labels:
        app: forecast-svc
        component: msa-pod
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "80"
    spec:
      serviceAccountName: forecast-svc
      volumes:
        - name: gcp-sa-key
          secret:
            secretName: forecast-svc-secret
            items:
              - key: FORECAST_GCP_SA_KEY_JSON
                path: sa-key.json
      containers:
        - name: app
          image: ${ECR_REGISTRY}/bookflow/forecast-svc:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          envFrom:
            - configMapRef:
                name: forecast-svc-env
            - secretRef:
                name: forecast-svc-secret
          env:
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /var/run/gcp-sa/sa-key.json
          volumeMounts:
            - name: gcp-sa-key
              mountPath: /var/run/gcp-sa
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            periodSeconds: 15
