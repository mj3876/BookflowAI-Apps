apiVersion: v1
kind: ConfigMap
metadata:
  name: forecast-svc-env
  namespace: bookflow
data:
  FORECAST_RDS_HOST: "${RDS_HOST}"
  FORECAST_RDS_PORT: "5432"
  FORECAST_RDS_DB: "bookflow"
  FORECAST_RDS_USER: "forecast_svc"
  FORECAST_REDIS_HOST: "${REDIS_HOST}"
  FORECAST_REDIS_PORT: "6379"
  FORECAST_AUTH_MODE: "mock"
  FORECAST_LOG_LEVEL: "INFO"
  # GCP project id 는 상수 — envsubst/eks_addons 어느 경로에서도 ${...} 미치환되어 하드코딩.
  FORECAST_BQ_PROJECT_ID: "project-8ab6bf05-54d2-4f5d-b8d"
  FORECAST_BQ_DATASET_ID: "bookflow_dw"
  FORECAST_BQ_FORECAST_TABLE: "forecast_results"
  FORECAST_BQ_LOCATION: "asia-northeast1"
  FORECAST_BQ_REFRESH_DAYS: "7"
  FORECAST_GCP_VERTEX_INVOKE_URL: "${GCP_VERTEX_INVOKE_URL}"
  FORECAST_GCP_NEW_BOOK_INFERENCE_URL: ""
  FORECAST_GCP_HTTP_TIMEOUT_SECONDS: "30"
  FORECAST_ALLOW_MOCK_FALLBACK: "false"
  # Direct Vertex AI SDK call via VPN (bypasses Cloud Function ALLOW_INTERNAL_ONLY block)
  FORECAST_GCP_VERTEX_ENDPOINT_NAME: "${GCP_VERTEX_ENDPOINT_NAME}"
  FORECAST_GCP_VERTEX_PRIVATE_API_ENDPOINT: "${GCP_VERTEX_PRIVATE_API_ENDPOINT}"
  # forecast → decision-svc trigger (post BQ refresh)
  FORECAST_DECISION_SVC_URL: "http://decision-svc.bookflow.svc.cluster.local"
  AUTH_MODE: "jwt"
  AUTH_JWT_ISSUER: "bookflow-auth-pod"
  AUTH_JWT_AUDIENCE: "bookflow-services"
