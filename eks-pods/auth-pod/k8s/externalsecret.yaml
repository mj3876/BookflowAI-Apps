# auth-pod : Entra OIDC client secret + JWT signing key + RDS password from AWS Secrets Manager via ESO.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: auth-pod-secret
  namespace: bookflow
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bookflow-aws-secrets
    kind: ClusterSecretStore
  target:
    name: auth-pod-secret
    creationPolicy: Owner
  data:
    - secretKey: AUTH_ENTRA_CLIENT_SECRET
      remoteRef:
        key: bookflow/auth/entra-client-secret
        property: client_secret
    - secretKey: AUTH_JWT_SIGNING_KEY
      remoteRef:
        key: bookflow/auth/jwt-signing-key
    - secretKey: AUTH_RDS_PASSWORD
      remoteRef:
        key: bookflow/rds/master-password
        property: password
