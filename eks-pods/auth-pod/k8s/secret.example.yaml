# auth-pod-secret · placeholder · 실제 cluster 에는 ESO ExternalSecret 또는 manual create 로 동기화
# Required keys (env: AUTH_*):
#   AUTH_ENTRA_CLIENT_SECRET — Entra App client_secret (from KV bookflow-client-secret · AWS bookflow/auth/entra-client-secret)
#   AUTH_JWT_SIGNING_KEY     — BookFlow internal JWT HS256 key (from AWS bookflow/auth/jwt-signing-key)
#   AUTH_RDS_PASSWORD        — RDS auth_pod role password (from AWS bookflow/rds/master-password 또는 별도 role)
#
# 매뉴얼 생성 (1회):
#   ENTRA=$(aws secretsmanager get-secret-value --secret-id bookflow/auth/entra-client-secret --query SecretString --output text | jq -r .client_secret)
#   JWT=$(aws secretsmanager get-secret-value --secret-id bookflow/auth/jwt-signing-key --query SecretString --output text)
#   RDS=$(aws secretsmanager get-secret-value --secret-id bookflow/rds/master-password --query SecretString --output text | jq -r .password)
#   kubectl create secret generic auth-pod-secret -n bookflow \
#     --from-literal=AUTH_ENTRA_CLIENT_SECRET="$ENTRA" \
#     --from-literal=AUTH_JWT_SIGNING_KEY="$JWT" \
#     --from-literal=AUTH_RDS_PASSWORD="$RDS" \
#     --dry-run=client -o yaml | kubectl apply -f -
---
apiVersion: v1
kind: Secret
metadata:
  name: auth-pod-secret
  namespace: bookflow
type: Opaque
stringData:
  AUTH_ENTRA_CLIENT_SECRET: REPLACE_ME
  AUTH_JWT_SIGNING_KEY: REPLACE_ME
  AUTH_RDS_PASSWORD: REPLACE_ME
