# Let's Encrypt ClusterIssuer (Production · DNS-01 via Route53)
# bookflow.myosoon.store (가비아 도메인 · NS → Route53 위임)
# 90일 자동 갱신 · 5 cert/7day rate limit
# cert-manager ServiceAccount 는 IRSA role 사용 (영구 자원: bookflow-cert-manager-route53)
# 적용: kubectl apply -f cluster-issuer.yaml
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: bleach10905@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
    - selector:
        dnsZones: ["myosoon.store"]
      dns01:
        route53:
          region: ap-northeast-1
          hostedZoneID: Z0061717U502ZCK2HCCF
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: bleach10905@gmail.com
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
    - selector:
        dnsZones: ["myosoon.store"]
      dns01:
        route53:
          region: ap-northeast-1
          hostedZoneID: Z0061717U502ZCK2HCCF
