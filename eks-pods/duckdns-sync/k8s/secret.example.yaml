# DuckDNS API token Secret (placeholder · 실제 token 은 cluster 에 직접 create)
# 매일 redeploy 시 자동 생성: scripts/aws/tasks/eks_addons.py 에서 .env.local BOOKFLOW_DUCKDNS_TOKEN 로 create.
# kubectl create secret generic duckdns-token -n ingress-nginx --from-literal=token=<TOKEN> --dry-run=client -o yaml | kubectl apply -f -
---
apiVersion: v1
kind: Secret
metadata:
  name: duckdns-token
  namespace: ingress-nginx
type: Opaque
stringData:
  token: REPLACE_ME
