# BookFlowAI-Apps В· eks-pods В· CodeBuild buildspec
# CodeBuild к°Җ мӢӨн–үн•ҳлҠ” лӘ…л №. eks-pipeline.yaml мқҳ CodeBuildProject к°Җ reference.
#
# Env vars (eks-pipeline.yaml к°Җ мЈјмһ…):
#   AWS_REGION В· AWS_ACCOUNT_ID В· ECR_REGISTRY В· PROJECT_NAME В· EKS_CLUSTER_NAME В· KUBECTL_VERSION
#
# нқҗлҰ„:
#   install:    kubectl + envsubst м„Өм№ҳ (filesystem В· лӘЁл“  phase м—җм„ң мӮ¬мҡ© к°ҖлҠҘ)
#   build:      лӘЁл“  лЎңм§Ғ н•ң phase м—җ нҶөн•© (CodeBuild phase к°„ shell ліҖмҲҳ л¶„лҰ¬ нҡҢн”ј)
#               1. ECR login
#               2. eks-pods/ н•ҳмң„ Dockerfile к°Җм§„ dir мһҗлҸҷ л°ңкІ¬ вҶ’ docker build/push
#               3. kubectl мқёмҰқ + namespace ліҙмһҘ
#               4. к°Ғ pod мқҳ k8s manifest envsubst вҶ’ kubectl apply
#               5. kubectl rollout status кІҖмҰқ

version: 0.2

env:
  variables:
    NAMESPACE: bookflow

phases:
  install:
    commands:
      # standard:7.0 + PrivilegedMode л©ҙ Docker мһҗлҸҷ мӮ¬мҡ© к°ҖлҠҘ (runtime-versions docker л¶Ҳн•„мҡ”)
      - echo "Installing kubectl ${KUBECTL_VERSION}"
      - curl -sLo /usr/local/bin/kubectl "https://dl.k8s.io/release/v${KUBECTL_VERSION}.0/bin/linux/amd64/kubectl"
      - chmod +x /usr/local/bin/kubectl
      - kubectl version --client=true
      # envsubst к°Җ м—Ҷмңјл©ҙ м„Өм№ҳ (standard:7.0 м—җ ліҙнҶө мһҲм§Җл§Ң м•Ҳм „л§қ)
      - which envsubst || (apt-get update -qq && apt-get install -y -qq gettext-base)

  build:
    commands:
      # в”Җв”Җ 0. dynamic vars (н•ң phase лӮҙм—җм„ңл§Ң мң нҡЁ В· лӢӨлҘё phase лЎң м•Ҳ л„ҳм–ҙк°җ) в”Җв”Җ
      - cd eks-pods
      - export IMAGE_TAG=$(echo "$CODEBUILD_RESOLVED_SOURCE_VERSION" | cut -c1-7)
      - echo "IMAGE_TAG=$IMAGE_TAG  NAMESPACE=$NAMESPACE  REGISTRY=$ECR_REGISTRY"
      # Dockerfile к°Җм§„ лӘЁл“  pod (apply лҢҖмғҒ base list)
      - export ALL_PODS=$(find . -mindepth 2 -maxdepth 2 -name Dockerfile -exec dirname {} \; | sed 's|^\./||' | sort)
      # в”Җв”Җ ліҖкІҪлҗң pod л§Ң build (CodeBuild source к°Җ git history ліҙмң  мӢң diff к°ҖлҠҘ) в”Җв”Җ
      # м•Ҳм „ лЈ°:
      #   - eks-pods/_shared/, buildspec.yml ліҖкІҪ вҶ’ м „мІҙ rebuild (кіөмң  мҳҒн–Ҙ)
      #   - к·ё мҷё вҶ’ ліҖкІҪлҗң pod л§Ң build (rollout лҸ„ ліҖкІҪ pod л§Ң кІҖмҰқ)
      #   - git diff м•Ҳлҗҳл©ҙ (shallow clone л“ұ) fallback: м „мІҙ rebuild
      - |
        cd ..  # repo root лЎң мқҙлҸҷ (git diff)
        BUILD_PODS=""
        if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD || true)
          echo "Changed files in this commit:"
          echo "$CHANGED_FILES" | sed 's/^/  /'
          if echo "$CHANGED_FILES" | grep -qE "^eks-pods/(_shared/|buildspec\.yml$)"; then
            echo "shared file changed вҶ’ rebuild ALL pods"
            BUILD_PODS="$ALL_PODS"
          else
            CHANGED_PODS=$(echo "$CHANGED_FILES" | grep "^eks-pods/" | cut -d/ -f2 | sort -u)
            for p in $CHANGED_PODS; do
              if echo "$ALL_PODS" | grep -q "^${p}$"; then
                BUILD_PODS="$BUILD_PODS $p"
              fi
            done
            BUILD_PODS=$(echo $BUILD_PODS | tr ' ' '\n' | sort -u | tr '\n' ' ')
          fi
        else
          echo "no git history (shallow clone?) вҶ’ rebuild ALL pods"
          BUILD_PODS="$ALL_PODS"
        fi
        cd eks-pods
        if [ -z "$BUILD_PODS" ] || [ "$BUILD_PODS" = " " ]; then
          echo "no pod changed in this commit В· skip build (rollout лҸ„ skip)"
          export PODS=""
        else
          export PODS="$BUILD_PODS"
          echo "Pods to build (changed only):" $PODS
        fi
      - |
        if [ -z "$PODS" ]; then
          echo "=== No pods to build В· exiting cleanly ==="
          exit 0
        fi

      # в”Җв”Җ 1. ECR login + docker build/push в”Җв”Җ
      - aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$ECR_REGISTRY"
      - |
        for pod in $PODS; do
          echo "=== Building $pod ==="
          # 2026-05-15 v5 fix: --no-cache к°•м ң (frontend Vite build stale нҡҢн”ј)
          docker build --no-cache -t "$ECR_REGISTRY/$PROJECT_NAME/$pod:$IMAGE_TAG" "$pod"
          docker tag "$ECR_REGISTRY/$PROJECT_NAME/$pod:$IMAGE_TAG" "$ECR_REGISTRY/$PROJECT_NAME/$pod:latest"
          docker push "$ECR_REGISTRY/$PROJECT_NAME/$pod:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$PROJECT_NAME/$pod:latest"
        done

      # в”Җв”Җ 2. kubectl мқёмҰқ (Access Entry В· IAM role мӮ¬м „ л“ұлЎқ н•„мҡ”) в”Җв”Җ
      - aws eks update-kubeconfig --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION"
      - kubectl get ns "$NAMESPACE" 2>/dev/null || kubectl create namespace "$NAMESPACE"

      # в”Җв”Җ 3. K8s manifest envsubst вҶ’ apply в”Җв”Җ
      # RDS endpoint В· DuckDNS FQDN лҸҷм Ғ fetch (л§Өмқј redeploy мӢң stale л°©м§Җ)
      - export RDS_HOST=$(aws rds describe-db-instances --region "$AWS_REGION" --db-instance-identifier bookflow-postgres --query "DBInstances[0].Endpoint.Address" --output text)
      # 2026-05-15: REDIS_HOST лҸҷм Ғ fetch (л§Өмқј redeploy мӢң ElastiCache endpoint ліҖлҸҷ вҖ” configmap stale нҡҢн”ј)
      - export REDIS_HOST=$(aws elasticache describe-cache-clusters --region "$AWS_REGION" --cache-cluster-id bookflow-redis --show-cache-node-info --query "CacheClusters[0].CacheNodes[0].Endpoint.Address" --output text)
      - export DOMAIN="${DOMAIN:-bookflow.myosoon.store}"
      - echo "RDS_HOST=$RDS_HOST  REDIS_HOST=$REDIS_HOST  DOMAIN=$DOMAIN"
      - |
        for pod in $PODS; do
          if [ ! -d "$pod/k8s" ]; then
            echo "skip $pod (no k8s/ dir)"
            continue
          fi
          echo "=== Applying $pod ==="
          export POD_NAME="$pod"
          for f in "$pod"/k8s/*.yaml "$pod"/k8s/*.yml; do
            [ -f "$f" ] || continue
            # *.example.yaml/*.example.yml мқҖ placeholder лқј cicd к°Җ apply н•ҳм§Җ м•ҠмқҢ
            # ExternalSecret мқҖ eks_addons к°Җ ESO helm + ClusterSecretStore к№”м•„л‘җлҜҖлЎң м •мғҒ apply
            case "$f" in *.example.yaml|*.example.yml) echo "  skip $f (example)"; continue;; esac
            envsubst < "$f" | kubectl apply -n "$NAMESPACE" -f -
          done
        done

      # в”Җв”Җ 4. Rollout status (Deployment л§Ң В· CronJob мқҖ skip) в”Җв”Җ
      # manifest к°Җ image: .../:${IMAGE_TAG} (= git SHA) лқј м»Өл°Ӣл§ҲлӢӨ tag ліҖкІҪ вҶ’
      # kubectl apply к°Җ image н•„л“ң ліҖкІҪмңјлЎң rollout мқ„ мһҗлҸҷ нҠёлҰ¬кұ°. restart л¶Ҳн•„мҡ”.
      # dashboard-svc лҠ” multi-stage (node build вҶ’ python serve В· web bundle нҒј) лқј
      # мӢңмһ‘ мӢңк°„ лҚ” кёём–ҙм„ң timeout 300s. лӢӨлҘё pod лҸ„ graceful term + readiness м—¬мң  кі л Өн•ҙ лҸҷмқј.
      - |
        for pod in $PODS; do
          if kubectl get deployment "$pod" -n "$NAMESPACE" >/dev/null 2>&1; then
            kubectl rollout status deployment/"$pod" -n "$NAMESPACE" --timeout=300s || exit 1
          fi
        done
      - echo "=== Build complete ==="

artifacts:
  files:
    - '**/*'
  base-directory: eks-pods
