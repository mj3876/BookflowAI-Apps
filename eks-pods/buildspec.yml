# BookFlowAI-Apps · eks-pods · CodeBuild buildspec
# CodeBuild 가 실행하는 명령. eks-pipeline.yaml 의 CodeBuildProject 가 reference.
#
# Env vars (eks-pipeline.yaml 가 주입):
#   AWS_REGION · AWS_ACCOUNT_ID · ECR_REGISTRY · PROJECT_NAME · EKS_CLUSTER_NAME · KUBECTL_VERSION
#
# 흐름:
#   install:    kubectl + envsubst 설치 (filesystem · 모든 phase 에서 사용 가능)
#   build:      모든 로직 한 phase 에 통합 (CodeBuild phase 간 shell 변수 분리 회피)
#               1. ECR login
#               2. eks-pods/ 하위 Dockerfile 가진 dir 자동 발견 → docker build/push
#               3. kubectl 인증 + namespace 보장
#               4. 각 pod 의 k8s manifest envsubst → kubectl apply
#               5. kubectl rollout status 검증

version: 0.2

env:
  variables:
    NAMESPACE: bookflow

phases:
  install:
    commands:
      # standard:7.0 + PrivilegedMode 면 Docker 자동 사용 가능 (runtime-versions docker 불필요)
      - echo "Installing kubectl ${KUBECTL_VERSION}"
      - curl -sLo /usr/local/bin/kubectl "https://dl.k8s.io/release/v${KUBECTL_VERSION}.0/bin/linux/amd64/kubectl"
      - chmod +x /usr/local/bin/kubectl
      - kubectl version --client=true
      # envsubst 가 없으면 설치 (standard:7.0 에 보통 있지만 안전망)
      - which envsubst || (apt-get update -qq && apt-get install -y -qq gettext-base)

  build:
    commands:
      # ── 0. dynamic vars (한 phase 내에서만 유효 · 다른 phase 로 안 넘어감) ──
      - cd eks-pods
      - export IMAGE_TAG=$(echo "$CODEBUILD_RESOLVED_SOURCE_VERSION" | cut -c1-7)
      - echo "IMAGE_TAG=$IMAGE_TAG  NAMESPACE=$NAMESPACE  REGISTRY=$ECR_REGISTRY"
      # Dockerfile 가진 모든 pod (apply 대상 base list)
      - export ALL_PODS=$(find . -mindepth 2 -maxdepth 2 -name Dockerfile -exec dirname {} \; | sed 's|^\./||' | sort)
      # ── 변경된 pod 만 build (CodeBuild source 가 git history 보유 시 diff 가능) ──
      # 안전 룰:
      #   - eks-pods/_shared/, buildspec.yml 변경 → 전체 rebuild (공유 영향)
      #   - 그 외 → 변경된 pod 만 build (rollout 도 변경 pod 만 검증)
      #   - git diff 안되면 (shallow clone 등) fallback: 전체 rebuild
      - |
        cd ..  # repo root 로 이동 (git diff)
        BUILD_PODS=""
        if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD || true)
          echo "Changed files in this commit:"
          echo "$CHANGED_FILES" | sed 's/^/  /'
          if echo "$CHANGED_FILES" | grep -qE "^eks-pods/(_shared/|buildspec\.yml$)"; then
            echo "shared file changed → rebuild ALL pods"
            BUILD_PODS="$ALL_PODS"
          else
            CHANGED_PODS=$(echo "$CHANGED_FILES" | grep "^eks-pods/" | cut -d/ -f2 | sort -u)
            for p in $CHANGED_PODS; do
              if echo "$ALL_PODS" | grep -q "^${p}$"; then
                BUILD_PODS="$BUILD_PODS $p"
              fi
            done
            BUILD_PODS=$(echo $BUILD_PODS | tr ' ' '\n' | sort -u | tr '\n' ' ')
          fi
        else
          echo "no git history (shallow clone?) → rebuild ALL pods"
          BUILD_PODS="$ALL_PODS"
        fi
        cd eks-pods
        if [ -z "$BUILD_PODS" ] || [ "$BUILD_PODS" = " " ]; then
          echo "no pod changed in this commit · skip build (rollout 도 skip)"
          export PODS=""
        else
          export PODS="$BUILD_PODS"
          echo "Pods to build (changed only):" $PODS
        fi
      - |
        if [ -z "$PODS" ]; then
          echo "=== No pods to build · exiting cleanly ==="
          exit 0
        fi

      # ── 1. ECR login + docker build/push ──
      - aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$ECR_REGISTRY"
      - |
        for pod in $PODS; do
          echo "=== Building $pod ==="
          # 2026-05-15 v5 fix: --no-cache 강제 (frontend Vite build stale 회피)
          docker build --no-cache -t "$ECR_REGISTRY/$PROJECT_NAME/$pod:$IMAGE_TAG" "$pod"
          docker tag "$ECR_REGISTRY/$PROJECT_NAME/$pod:$IMAGE_TAG" "$ECR_REGISTRY/$PROJECT_NAME/$pod:latest"
          docker push "$ECR_REGISTRY/$PROJECT_NAME/$pod:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$PROJECT_NAME/$pod:latest"
        done

      # ── 2. kubectl 인증 (Access Entry · IAM role 사전 등록 필요) ──
      - aws eks update-kubeconfig --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION"
      - kubectl get ns "$NAMESPACE" 2>/dev/null || kubectl create namespace "$NAMESPACE"

      # ── 3. K8s manifest envsubst → apply ──
      # RDS endpoint · DuckDNS FQDN 동적 fetch (매일 redeploy 시 stale 방지)
      - export RDS_HOST=$(aws rds describe-db-instances --region "$AWS_REGION" --db-instance-identifier bookflow-postgres --query "DBInstances[0].Endpoint.Address" --output text)
      # 2026-05-15: REDIS_HOST 동적 fetch (매일 redeploy 시 ElastiCache endpoint 변동 — configmap stale 회피)
      - export REDIS_HOST=$(aws elasticache describe-cache-clusters --region "$AWS_REGION" --cache-cluster-id bookflow-redis --show-cache-node-info --query "CacheClusters[0].CacheNodes[0].Endpoint.Address" --output text)
      - export DOMAIN="${DOMAIN:-bookflow.myosoon.store}"
      - echo "RDS_HOST=$RDS_HOST  REDIS_HOST=$REDIS_HOST  DOMAIN=$DOMAIN"
      - |
        for pod in $PODS; do
          if [ ! -d "$pod/k8s" ]; then
            echo "skip $pod (no k8s/ dir)"
            continue
          fi
          echo "=== Applying $pod ==="
          export POD_NAME="$pod"
          for f in "$pod"/k8s/*.yaml "$pod"/k8s/*.yml; do
            [ -f "$f" ] || continue
            # *.example.yaml/*.example.yml 은 placeholder 라 cicd 가 apply 하지 않음
            # ExternalSecret 은 eks_addons 가 ESO helm + ClusterSecretStore 깔아두므로 정상 apply
            case "$f" in *.example.yaml|*.example.yml) echo "  skip $f (example)"; continue;; esac
            envsubst < "$f" | kubectl apply -n "$NAMESPACE" -f -
          done
        done

      # ── 4. Rollout restart + status (Deployment 만 · CronJob 은 skip) ──
      # apply 가 spec 무변경(:latest 동일 tag · manifest 미변경 등)이면 rollout 미트리거.
      # rollout restart 로 변경 pod 의 새 이미지(:latest) pull 을 강제한 뒤 status 검증.
      # dashboard-svc 는 multi-stage (node build → python serve · web bundle 큼) 라
      # 시작 시간 더 길어서 timeout 300s. 다른 pod 도 graceful term + readiness 여유 고려해 동일.
      - |
        for pod in $PODS; do
          if kubectl get deployment "$pod" -n "$NAMESPACE" >/dev/null 2>&1; then
            kubectl rollout restart deployment/"$pod" -n "$NAMESPACE"
            kubectl rollout status deployment/"$pod" -n "$NAMESPACE" --timeout=300s || exit 1
          fi
        done
      - echo "=== Build complete ==="

artifacts:
  files:
    - '**/*'
  base-directory: eks-pods
