# RDS password from AWS Secrets Manager via External Secrets Operator (eks-eso-irsa).
# Phase 2 placeholder — actual SecretStore + RDS secret name wired post-deploy.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: inventory-svc-secret
  namespace: bookflow
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bookflow-aws-secrets
    kind: ClusterSecretStore
  target:
    name: inventory-svc-secret
  data:
    - secretKey: INVENTORY_RDS_PASSWORD
      remoteRef:
        key: bookflow/rds/inventory_svc
        property: password
