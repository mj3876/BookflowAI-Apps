apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-svc
  namespace: bookflow
  labels:
    app: inventory-svc
    component: msa-pod
spec:
  replicas: 1  # dev cluster (t3.medium 17-pod limit). Phase 4: 2+ replicas with bigger nodegroup
  selector:
    matchLabels:
      app: inventory-svc
  template:
    metadata:
      labels:
        app: inventory-svc
        component: msa-pod
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "80"
    spec:
      serviceAccountName: inventory-svc  # IRSA wired by eks-irsa stack (Phase 4 hardening)
      containers:
        - name: app
          # ECR image · ${ECR_REGISTRY} substituted by buildspec/build script
          image: ${ECR_REGISTRY}/bookflow/inventory-svc:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          envFrom:
            - configMapRef:
                name: inventory-svc-env
            - secretRef:
                name: inventory-svc-secret
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            periodSeconds: 15
