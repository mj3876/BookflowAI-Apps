name: Sync Glue Scripts to S3

on:
  push:
    branches: [main]
    paths:
      - 'glue-jobs/**'
      - 'gcs-connector-hadoop3-latest.jar'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Sync Glue scripts to S3 (flat)
        run: |
          find glue-jobs -name "*.py" ! -path "*/__pycache__/*" | while read f; do
            fname=$(basename "$f")
            aws s3 cp "$f" "s3://bookflow-glue-scripts-${{ secrets.AWS_ACCOUNT_ID }}/scripts/$fname"
            echo "uploaded: $fname"
          done

      - name: Upload GCS connector jar
        run: |
          aws s3 cp gcs-connector-hadoop3-latest.jar \
            "s3://bookflow-glue-scripts-${{ secrets.AWS_ACCOUNT_ID }}/jars/gcs-connector-hadoop3-latest.jar"
