# BookFlowAI-Apps · ecs-sims · CodeBuild buildspec
# CodeBuild 가 실행하는 명령. ecs-pipeline.yaml 의 CodeBuildProject 가 reference.
#
# Env vars (ecs-pipeline.yaml 가 주입):
#   AWS_REGION · AWS_ACCOUNT_ID · ECR_REGISTRY · PROJECT_NAME · ECS_CLUSTER_NAME
#
# 흐름 (한 phase 통합 · CodeBuild phase 간 shell 격리 회피):
#   1. ECR login
#   2. ecs-sims/ 하위 Dockerfile 가진 디렉토리 자동 발견 (online-sim · offline-sim · inventory-api)
#      → docker build/push (commit SHA + latest 태그)
#   3. aws ecs update-service --force-new-deployment (각 서비스)
#      → ECS 가 :latest 이미지 pull · Fargate task replacement (rolling)

version: 0.2

phases:
  build:
    commands:
      # ── 0. dynamic vars ──
      - cd ecs-sims
      - export IMAGE_TAG=$(echo "$CODEBUILD_RESOLVED_SOURCE_VERSION" | cut -c1-7)
      - echo "IMAGE_TAG=$IMAGE_TAG  CLUSTER=$ECS_CLUSTER_NAME  REGISTRY=$ECR_REGISTRY"
      - export SVCS=$(find . -mindepth 2 -maxdepth 2 -name Dockerfile -exec dirname {} \; | sed 's|^\./||' | sort)
      - |
        if [ -z "$SVCS" ]; then
          echo "no Dockerfile found in ecs-sims/* · skip build"
          exit 0
        fi
      - echo "Services to build:" $SVCS

      # ── 1. ECR login + docker build/push ──
      - aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$ECR_REGISTRY"
      - |
        for svc in $SVCS; do
          echo "=== Building $svc ==="
          # Build context = ecs-sims root so Dockerfile can COPY sibling _shared module
          docker build -t "$ECR_REGISTRY/$PROJECT_NAME/$svc:$IMAGE_TAG" -f "$svc/Dockerfile" .
          docker tag "$ECR_REGISTRY/$PROJECT_NAME/$svc:$IMAGE_TAG" "$ECR_REGISTRY/$PROJECT_NAME/$svc:latest"
          docker push "$ECR_REGISTRY/$PROJECT_NAME/$svc:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$PROJECT_NAME/$svc:latest"
        done

      # ── 2. ECS service rolling update (taskdef 가 :latest 참조 → force-new-deployment 가 새 image pull) ──
      - |
        for svc in $SVCS; do
          SVC_NAME="$PROJECT_NAME-$svc"
          echo "=== Update ECS service $SVC_NAME ==="
          if aws ecs describe-services --cluster "$ECS_CLUSTER_NAME" --services "$SVC_NAME" \
              --query 'services[?status==`ACTIVE`].serviceName' --output text 2>/dev/null | grep -q "$SVC_NAME"; then
            aws ecs update-service \
              --cluster "$ECS_CLUSTER_NAME" \
              --service "$SVC_NAME" \
              --force-new-deployment \
              --region "$AWS_REGION" >/dev/null
            echo "  triggered new deployment"
          else
            echo "  service not found · skip (initial deploy 시 정상 · 첫 service 등록 후 다음 push 부터 동작)"
          fi
        done

      # ── 3. (선택) deployment 안정화 대기 ──
      - |
        for svc in $SVCS; do
          SVC_NAME="$PROJECT_NAME-$svc"
          if aws ecs describe-services --cluster "$ECS_CLUSTER_NAME" --services "$SVC_NAME" \
              --query 'services[?status==`ACTIVE`]' --output text 2>/dev/null | grep -q .; then
            aws ecs wait services-stable \
              --cluster "$ECS_CLUSTER_NAME" \
              --services "$SVC_NAME" \
              --region "$AWS_REGION" || echo "  $SVC_NAME stabilization timeout · continue"
          fi
        done
      - echo "=== Build complete ==="

artifacts:
  files:
    - '**/*'
  base-directory: ecs-sims
